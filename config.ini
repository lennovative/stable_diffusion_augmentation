[model]
name   = stabilityai/stable-diffusion-xl-base-1.0
device = cuda

[generation]
num_inference_steps  = 50
input_size           = 1024
attention_res        = 64
; comma-separated: down | up | mid  (or any combination)
allowed_places       = up, down
; two floats: start, end fraction of inversion steps used for base mask
base_mask_step_range = 0.0, 0.25
invert_mask          = false
; attention map merging when multiple tokens are specified: average | maximum | intersection
multi_token_merge    = average
; base mask source: attention (from inversion) | sam (GroundingDINO + SAM)
base_mask_source     = sam
save_debug           = false
save_debug_every     = 20
save_debug_latents   = false
save_inversion_pickle = false
; -1 = no fixed seed (fully random)
seed                 = 42
; kernel size for avg-pool blur applied to all masks (attention + reconstruction); 0 or 1 = no blur
mask_blur_k          = 0

[pass1]
; auto = "photo of a <subject>", empty = "" (use with base_mask_source = sam)
inversion_prompt_mode                    = auto
inversion_guidance_scale                 = 1.0
invert_frac                              = 1.0
guidance_scale                           = 7.5
eta                                      = 1.0
use_inversion_attention_transmission     = true
use_reconstruction_attention_transmission = true
transmission_alpha                       = 1.0
transmission_alpha_end                   = 0.2
initial_noise_beta                       = 0.1
base_mask_erode_radius                   = 0
recon_dilate_radius                      = 2
transition_gap_radius                    = 0
alpha_decay_start                        = 0.6
recon_alpha_decay                        = true
recon_attn_start_frac                    = 0.0
recon_attn_end_frac                      = 0.8
token_replace_frac                       = 0.0
token_replace_generic                    = subject
; SDEdit-inspired asymmetric noise schedule for Pass 1.
; When true, the background is started from heavier noise (bg_start_frac)
; for stronger prompt adherence, while the object region is anchored via
; DDIM inversion only up to obj_start_frac.
asymmetric_schedule                      = true
obj_start_frac                           = 1.0
bg_start_frac                            = 1.0
; width of the linear alpha ramp at the t_obj boundary (0 = hard switch)
transmission_ramp_steps                  = 0
; run a parallel UNet pass with concept template replaced by token_replace_generic;
; blend generic latents into positions where generic attention leaks outside the base mask
dual_recon_transmission                  = false
; ring-merge source for leaked background areas: inversion (lat_orig) | noise (q(z_t|z_0_bg), colour-neutral) | pure_noise (frozen ε, zero image signal)
transmission_source                      = pure_noise
; starting latent for denoising: composed (SDEdit z_init blend) | inversion (lat_orig at t_bg) | noise (pure fresh random noise)
init_latent                              = noise
; when transmission_source=noise: preprocess source image before encoding to remove colour bias
; none | grayscale | grayscale_blur
sdedit_bg_preprocess                     = none
sdedit_bg_blur_radius                    = 1.0

[pass2]
enabled                                  = false
inversion_prompt_mode                    = empty
inversion_guidance_scale                 = 1.0
invert_frac                              = 0.7
reconstruction_prompt_mode               = edit
guidance_scale                           = 7.5
eta                                      = 1.0
use_inversion_attention_transmission     = true
use_reconstruction_attention_transmission = true
transmission_alpha                       = 1.0
transmission_alpha_end                   = 0.2
initial_noise_beta                       = 0.1
base_mask_erode_radius                   = 1
recon_dilate_radius                      = 0
transition_gap_radius                    = 0
alpha_decay_start                        = 0.6
recon_alpha_decay                        = true
recon_attn_start_frac                    = 0.0
recon_attn_end_frac                      = 0.6
token_replace_frac                       = 0.0
token_replace_generic                    = subject
save_pre_polish                          = false

[sam]
grounding_dino_model = IDEA-Research/grounding-dino-tiny
sam_model            = facebook/sam-vit-base
box_threshold        = 0.3
text_threshold       = 0.25
; radius for two-pass box blur applied to smooth mask edges (0 = no smoothing)
edge_blur_radius     = 0
